<svg xmlns='http://www.w3.org/2000/svg' width='760' height='475' viewBox='0 0 760 475' role='img' aria-labelledby='title desc'>
  <title id='title'>Photo Manager Pro duplicate review screenshot</title>
  <desc id='desc'>Dark duplicate review screen with similarity groups, keep and delete choices, and a safe delete queue.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='#060914'/><stop offset='1' stop-color='#111827'/></linearGradient>
    <linearGradient id='photoA' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='#38bdf8'/><stop offset='1' stop-color='#065f46'/></linearGradient>
    <linearGradient id='photoB' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='#f97316'/><stop offset='1' stop-color='#1e293b'/></linearGradient>
    <style>
      .base{fill:url(#bg)}.chrome{fill:#0f1724;stroke:#243244}.panel{fill:#101827;stroke:#28384d}.sub{fill:#0c1320;stroke:#26374d}.ink{fill:#e6eef8;font-family:'Segoe UI',Arial,sans-serif}.muted{fill:#8fa3ba;font-family:'Segoe UI',Arial,sans-serif}.tiny{font-size:9px}.small{font-size:10px}.body{font-size:11px}.label{font-size:10px;font-weight:700}.h1{font-size:20px;font-weight:800}.h2{font-size:13px;font-weight:800}.btn{fill:#162235;stroke:#32445d}.accent{fill:#5eead4}.warn{fill:#fbbf24}.bad{fill:#fb7185}.ok{fill:#34d399}.line{stroke:#27364b;stroke-width:1}.tab{fill:#0b111b;stroke:#26374d}.tabActive{fill:#132338;stroke:#14b8a6}.mono{font-family:'Cascadia Code','SFMono-Regular',Consolas,monospace}
    </style>
  </defs>
  <rect class='base' width='760' height='475'/>
  <rect x='18' y='16' width='724' height='443' rx='14' class='chrome'/>
  <circle cx='39' cy='36' r='5' fill='#fb7185'/><circle cx='57' cy='36' r='5' fill='#fbbf24'/><circle cx='75' cy='36' r='5' fill='#34d399'/>
  <text x='96' y='40' class='ink h2'>Photo Manager Pro</text><text x='217' y='40' class='muted small'>Duplicate review and safe cleanup workflow</text>

  <g transform='translate(36 60)'>
    <rect width='88' height='28' rx='6' class='tab'/><text x='17' y='18' class='muted label'>Dashboard</text>
    <rect x='94' width='76' height='28' rx='6' class='tab'/><text x='114' y='18' class='muted label'>Gallery</text>
    <rect x='176' width='88' height='28' rx='6' class='tabActive'/><text x='192' y='18' class='ink label'>Duplicates</text>
    <rect x='270' width='80' height='28' rx='6' class='tab'/><text x='291' y='18' class='muted label'>Cleanup</text>
    <rect x='356' width='96' height='28' rx='6' class='tab'/><text x='375' y='18' class='muted label'>AI Metadata</text>
    <rect x='458' width='86' height='28' rx='6' class='tab'/><text x='477' y='18' class='muted label'>Sync Plan</text>
    <rect x='550' width='78' height='28' rx='6' class='tab'/><text x='570' y='18' class='muted label'>Settings</text>
    <rect x='634' width='92' height='28' rx='6' class='tab'/><text x='651' y='18' class='muted label'>Diagnostics</text>
  </g>

  <text x='36' y='121' class='ink h1'>Duplicates</text>
  <text x='36' y='141' class='muted body'>Compare similar files, keep the best copy, and review everything before deletion.</text>
  <rect x='440' y='103' width='74' height='28' rx='7' fill='#13b8a6'/><text x='464' y='121' fill='#031312' font-family='Segoe UI,Arial,sans-serif' font-size='10' font-weight='800'>Scan</text>
  <rect x='524' y='103' width='86' height='28' rx='7' class='btn'/><text x='548' y='121' class='ink label'>Refresh</text>
  <rect x='620' y='103' width='104' height='28' rx='7' class='btn'/><text x='645' y='121' class='ink label'>Open Cleanup</text>

  <g transform='translate(36 158)'>
    <rect width='496' height='270' rx='8' class='panel'/>
    <text x='16' y='24' class='ink h2'>Potential Duplicate Groups</text><text x='352' y='24' class='muted tiny'>2 groups found</text>

    <g transform='translate(16 44)'>
      <rect width='464' height='94' rx='8' class='sub'/>
      <rect x='14' y='14' width='76' height='58' rx='6' fill='url(#photoA)'/><path d='M14 72 L42 38 L56 56 L67 42 L90 72 Z' fill='#052e2b' opacity='.7'/>
      <rect x='102' y='14' width='76' height='58' rx='6' fill='url(#photoA)' opacity='.82'/><path d='M102 72 L130 38 L144 56 L155 42 L178 72 Z' fill='#052e2b' opacity='.7'/>
      <text x='194' y='25' class='ink body mono'>IMG_4021.jpg</text><text x='194' y='43' class='muted tiny'>D:/Photos/Inbox</text>
      <text x='194' y='63' class='ink body mono'>IMG_4021-copy.jpg</text><text x='194' y='81' class='muted tiny'>D:/Phone Export</text>
      <rect x='348' y='14' width='92' height='24' rx='12' fill='#132338' stroke='#14b8a6'/><text x='369' y='30' class='accent label'>98 percent</text>
      <rect x='348' y='50' width='42' height='24' rx='6' fill='#0f2f24' stroke='#34d399'/><text x='359' y='66' class='ok tiny'>Keep</text>
      <rect x='398' y='50' width='42' height='24' rx='6' fill='#31151c' stroke='#fb7185'/><text x='408' y='66' class='bad tiny'>Trash</text>
    </g>

    <g transform='translate(16 152)'>
      <rect width='464' height='94' rx='8' class='sub'/>
      <rect x='14' y='14' width='76' height='58' rx='6' fill='url(#photoB)'/><circle cx='64' cy='36' r='13' fill='#fde68a'/><path d='M14 72 L42 44 L58 60 L72 46 L90 72 Z' fill='#111827' opacity='.72'/>
      <rect x='102' y='14' width='76' height='58' rx='6' fill='url(#photoB)' opacity='.78'/><circle cx='152' cy='36' r='13' fill='#fde68a'/><path d='M102 72 L130 44 L146 60 L160 46 L178 72 Z' fill='#111827' opacity='.72'/>
      <text x='194' y='25' class='ink body mono'>DSC_1180.nef</text><text x='194' y='43' class='muted tiny'>D:/Camera/2024</text>
      <text x='194' y='63' class='ink body mono'>DSC_1180-export.jpg</text><text x='194' y='81' class='muted tiny'>D:/Edited/Exports</text>
      <rect x='348' y='14' width='92' height='24' rx='12' fill='#2a2410' stroke='#fbbf24'/><text x='369' y='30' class='warn label'>91 percent</text>
      <rect x='348' y='50' width='42' height='24' rx='6' fill='#0f2f24' stroke='#34d399'/><text x='359' y='66' class='ok tiny'>Keep</text>
      <rect x='398' y='50' width='42' height='24' rx='6' fill='#31151c' stroke='#fb7185'/><text x='408' y='66' class='bad tiny'>Trash</text>
    </g>
  </g>

  <g transform='translate(548 158)'>
    <rect width='176' height='270' rx='8' class='panel'/>
    <text x='14' y='24' class='ink h2'>Safe Delete Queue</text><text x='14' y='44' class='muted tiny'>Nothing is deleted until confirmed.</text>
    <line x1='14' y1='58' x2='162' y2='58' class='line'/>
    <rect x='14' y='76' width='148' height='48' rx='7' class='sub'/><text x='26' y='96' class='bad tiny mono'>IMG_4021-copy.jpg</text><text x='26' y='113' class='muted tiny'>Duplicate, 98 percent</text>
    <rect x='14' y='136' width='148' height='48' rx='7' class='sub'/><text x='26' y='156' class='warn tiny mono'>DSC_1180-export.jpg</text><text x='26' y='173' class='muted tiny'>Similar, review needed</text>
    <rect x='14' y='202' width='148' height='26' rx='7' fill='#13b8a6'/><text x='48' y='219' fill='#031312' font-family='Segoe UI,Arial,sans-serif' font-size='10' font-weight='800'>Confirm Move</text>
    <rect x='14' y='238' width='148' height='18' rx='9' fill='#0b111b'/><rect x='14' y='238' width='88' height='18' rx='9' fill='#14b8a6'/><text x='42' y='251' fill='#031312' font-family='Segoe UI,Arial,sans-serif' font-size='9' font-weight='800'>2 queued</text>
  </g>
</svg>
