name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  package:
    name: Package sanity check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build and test tools
        run: python -m pip install --upgrade build pytest twine

      - name: Parse Python source
        run: python -m compileall -q .

      - name: Run tests
        run: python -m pytest

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*
