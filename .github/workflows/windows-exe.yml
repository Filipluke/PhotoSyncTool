name: Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and PyInstaller
        run: python -m pip install --upgrade ".[exe]"

      - name: Build executable
        run: >
          pyinstaller
          --noconfirm
          --onefile
          --windowed
          --name PhotoManagerPro
          --icon photosync_tool_assets/photo_manager_icon.ico
          --add-data "photosync_tool_assets;photosync_tool_assets"
          photo_manager_gui.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoManagerPro-windows
          path: dist/PhotoManagerPro.exe

      - name: Attach executable to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PhotoManagerPro.exe
